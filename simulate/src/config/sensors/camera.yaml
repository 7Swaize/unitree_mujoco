# 'res_x' and 'res_y' defines the physical resolution of the image buffer.
# So, it determines how many pixels to draw per frame capture.
res_x: 620
res_y: 480

# These are the default clipping planes set by the simulation.
# NOTE: This affects the clipping planes on ALL cameras.
far_clip: 50
near_clip: 0.01

# It won't publish at exactly input fps, rather plus or minus 1-2 frames.  
publish_fps: 60